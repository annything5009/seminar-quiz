<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>โฮสต์ควิซ</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", "Sarabun", sans-serif;
    background: #16213e;
    min-height: 100vh;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 900px; padding: 24px; text-align: center; }
  h1 { font-size: 2em; margin-bottom: 4px; }
  .sub { opacity: .7; margin-top: 0; }
  .keybox {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 20px;
    margin: 20px 0;
  }
  input {
    padding: 10px;
    font-size: 1em;
    border-radius: 8px;
    border: none;
    text-align: center;
  }
  button {
    padding: 12px 28px;
    font-size: 1.1em;
    border-radius: 10px;
    border: none;
    background: #ffcc00;
    color: #222;
    font-weight: bold;
    cursor: pointer;
    margin: 6px;
  }
  button:disabled { opacity: .4; cursor: default; }
  .big-count { font-size: 3em; font-weight: bold; }
  .qbox { background: #1e293b; border-radius: 16px; padding: 24px; margin: 20px 0; text-align: left; }
  .qtext { font-size: 1.5em; font-weight: bold; margin-bottom: 16px; text-align: center; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .choice-row { padding: 14px; border-radius: 10px; font-weight: bold; display: flex; justify-content: space-between; }
  .c0 { background: #e21b3c; } .c1 { background: #1368ce; }
  .c2 { background: #d89e00; } .c3 { background: #26890c; }
  .correct-mark { outline: 4px solid #fff; }
  .progress { margin: 10px 0; opacity: .8; }
  table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  th, td { padding: 10px; border-bottom: 1px solid #334155; text-align: left; }
  th { opacity: .7; font-weight: normal; }
  .rank1 { color: #ffd700; font-weight: bold; }
  .rank2 { color: #c0c0c0; font-weight: bold; }
  .rank3 { color: #cd7f32; font-weight: bold; }
  #screen-locked, #screen-lobby, #screen-question, #screen-reveal, #screen-over { display: none; }
  .active { display: block !important; }
  code { background: #0f172a; padding: 2px 8px; border-radius: 6px; }
</style>
</head>
<body>
<div class="wrap">

  <div id="screen-locked" class="active">
    <h1>🔐 เข้าสู่โหมดโฮสต์</h1>
    <p class="sub">🔑 ใส่รหัสโฮสต์ (แสดงใน terminal ตอนรันเซิร์ฟเวอร์)</p>
    <input id="keyInput" placeholder="🔑 host key" />
    <br /><button onclick="doAuth()">➡️ เข้าสู่ระบบ</button>
    <p id="authError" style="color:#f87171;"></p>
  </div>

  <div id="screen-lobby">
    <h1>🌱 🎉 ชาวสิ่งแวดล้อมพักเบรก 🍃</h1>
    <p class="sub">📱 ให้ผู้เข้าร่วมเปิดลิงก์นี้บนมือถือ:</p>
    <div class="keybox">
      <code id="playerLink"></code>
    </div>
    <p>👥 ผู้เล่นเข้าร่วมแล้ว:</p>
    <div class="big-count" id="playerCount">0</div>
    <button id="startBtn" onclick="startGame()">▶️ เริ่มเกม</button>
  </div>

  <div id="screen-question">
    <p class="progress" id="qProgress"></p>
    <div class="qbox">
      <div class="qtext" id="qtext"></div>
      <div class="choices" id="choices"></div>
    </div>
    <p class="progress" id="answerProgress"></p>
  </div>

  <div id="screen-reveal">
    <p class="progress" id="rProgress"></p>
    <div class="qbox">
      <div class="qtext">✅ คำตอบที่ถูกต้อง</div>
      <div class="choices" id="rChoices"></div>
    </div>
    <h2>🏆 คะแนนสูงสุด 3 อันดับ (เห็นเฉพาะโฮสต์)</h2>
    <table id="leaderboard"></table>
    <button id="nextBtn" onclick="nextQuestion()">➡️ ข้อถัดไป</button>
  </div>

  <div id="screen-over">
    <h1>🏁 จบเกม! 🎊</h1>
    <h2>🏆 ผู้ชนะ 3 อันดับแรก</h2>
    <table id="finalLeaderboard"></table>
    <button onclick="resetGame()">🔄 เริ่มเกมใหม่ (รีเซ็ตคะแนน)</button>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const screens = ["locked","lobby","question","reveal","over"];
  function show(name) {
    screens.forEach(s => {
      document.getElementById("screen-"+s).classList.toggle("active", s===name);
    });
  }

  const urlParams = new URLSearchParams(window.location.search);
  const prefilledKey = urlParams.get("key");
  if (prefilledKey) document.getElementById("keyInput").value = prefilledKey;

  document.getElementById("playerLink").textContent =
    window.location.origin + "/player.html";

  function doAuth() {
    const key = document.getElementById("keyInput").value.trim();
    socket.emit("host:auth", { key }, (res) => {
      if (res.ok) {
        show("lobby");
      } else {
        document.getElementById("authError").textContent = "รหัสไม่ถูกต้อง";
      }
    });
  }
  if (prefilledKey) doAuth();

  socket.on("host:lobby", (data) => {
    document.getElementById("playerCount").textContent = data.count;
  });

  function startGame() { socket.emit("host:start"); }
  function nextQuestion() { socket.emit("host:next"); }
  function resetGame() { socket.emit("host:reset"); show("lobby"); }

  const colorClasses = ["c0","c1","c2","c3"];

  socket.on("host:question", (q) => {
    show("question");
    document.getElementById("qProgress").textContent =
      `ข้อ ${q.index+1} / ${q.total}`;
    document.getElementById("qtext").textContent = q.question;
    const el = document.getElementById("choices");
    el.innerHTML = "";
    const shapeIcons = ["▲", "◆", "●", "■"];
    q.choices.forEach((c, i) => {
      const div = document.createElement("div");
      div.className = "choice-row " + colorClasses[i];
      div.innerHTML = `<span>${shapeIcons[i]} ${c}</span>`;
      el.appendChild(div);
    });
    document.getElementById("answerProgress").textContent =
      `ตอบแล้ว 0 / ${q.totalPlayers}`;
  });

  socket.on("host:answerProgress", (d) => {
    document.getElementById("answerProgress").textContent =
      `ตอบแล้ว ${d.answeredCount} / ${d.totalPlayers}`;
  });

  socket.on("host:reveal", (r) => {
    show("reveal");
    document.getElementById("rProgress").textContent =
      r.isLast ? "ข้อสุดท้าย" : "";
    const el = document.getElementById("rChoices");
    el.innerHTML = "";
    const shapeIcons = ["▲", "◆", "●", "■"];
    r.distribution.forEach((count, i) => {
      const div = document.createElement("div");
      div.className = "choice-row " + colorClasses[i] +
        (i === r.correctIndex ? " correct-mark" : "");
      div.innerHTML = `<span>${shapeIcons[i]}${i === r.correctIndex ? " ✔" : ""}</span><span>${count} คน</span>`;
      el.appendChild(div);
    });

    renderLeaderboard("leaderboard", r.top3);
    document.getElementById("nextBtn").textContent =
      r.isLast ? "จบเกม 🏁" : "ข้อถัดไป ▶";
  });

  function renderLeaderboard(tableId, top3) {
    const table = document.getElementById(tableId);
    const ranks = ["rank1","rank2","rank3"];
    const medals = ["🥇","🥈","🥉"];
    let html = "<tr><th></th><th>ชื่อ</th><th>คะแนน</th></tr>";
    top3.forEach((p, i) => {
      html += `<tr><td class="${ranks[i]}">${medals[i]}</td><td>${p.name}</td><td>${p.score}</td></tr>`;
    });
    table.innerHTML = html;
  }

  socket.on("host:gameOver", (data) => {
    show("over");
    renderLeaderboard("finalLeaderboard", data.top3);
  });
</script>
</body>
</html>
